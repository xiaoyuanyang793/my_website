<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言板</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="auth-card" id="loginView">
      <p class="eyebrow">Message Board</p>
      <h1>登录</h1>
      <form id="loginForm">
        <label>
          邮箱
          <input id="loginEmailInput" type="email" placeholder="name@example.com" required>
        </label>
        <label>
          密码
          <input id="loginPasswordInput" type="password" placeholder="请输入密码" required>
        </label>
        <button type="submit">登录</button>
        <p class="status-text" id="loginStatus">登录后进入留言板。</p>
      </form>
      <button class="link-button" type="button" id="showRegisterButton">还没有账号？去注册</button>
    </section>

    <section class="auth-card hidden" id="registerView">
      <p class="eyebrow">Create Account</p>
      <h1>注册</h1>
      <form id="registerForm">
        <label>
          邮箱
          <input id="registerEmailInput" type="email" placeholder="name@example.com" required>
        </label>
        <label>
          密码
          <input id="registerPasswordInput" type="password" placeholder="至少 6 位密码" required>
        </label>
        <label>
          管理员密钥
          <input id="adminKeyInput" type="password" placeholder="不填则注册为普通用户">
        </label>
        <button type="submit">注册</button>
        <p class="status-text" id="registerStatus">普通用户可留空；管理员请填写授权密钥。</p>
      </form>
      <button class="link-button" type="button" id="showLoginButton">已有账号？返回登录</button>
    </section>

    <section class="board-panel hidden" id="boardView">
      <div class="top-bar">
        <div>
          <p class="eyebrow">Message Board</p>
          <h1>留言板</h1>
        </div>
        <button class="secondary-button" type="button" id="logoutButton">退出</button>
      </div>

      <div class="mode-banner" id="modeBanner">
        <strong>用户模式</strong>
        <span>可以发布留言。</span>
      </div>

      <form class="message-form" id="messageForm">
        <label>
          显示名称
          <input id="nameInput" type="text" placeholder="比如：小杨" required>
        </label>
        <label>
          留言内容
          <textarea id="messageInput" placeholder="写下你想公开显示的话" required></textarea>
        </label>
        <button type="submit">发布留言</button>
        <p class="status-text" id="messageStatus">你可以发布留言。</p>
      </form>

      <div class="message-list" id="messageList">
        <p>正在加载留言...</p>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
