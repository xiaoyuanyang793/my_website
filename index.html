<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言板</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="board-panel">
      <div class="top-bar">
        <div>
          <p class="eyebrow">Message Board</p>
          <h1>留言板</h1>
        </div>
        <div class="auth-tabs" aria-label="账户操作">
          <button class="tab-button active" type="button" id="loginTabButton">登录</button>
          <button class="tab-button" type="button" id="registerTabButton">注册</button>
        </div>
      </div>

      <form class="auth-form" id="authForm">
        <label>
          邮箱
          <input id="emailInput" type="email" placeholder="name@example.com" required>
        </label>
        <label>
          密码
          <input id="passwordInput" type="password" placeholder="至少 6 位密码" required>
        </label>
        <label id="adminKeyLabel" class="hidden">
          管理员密钥
          <input id="adminKeyInput" type="password" placeholder="不填则注册为普通用户">
        </label>
        <div class="button-row">
          <button type="submit" id="authSubmitButton">登录</button>
          <button class="secondary-button" type="button" id="logoutButton">退出</button>
        </div>
        <p class="status-text" id="authStatus">当前未登录。</p>
      </form>

      <div class="mode-banner" id="modeBanner">
        <strong>游客模式</strong>
        <span>可以浏览留言。登录后可以发布留言。</span>
      </div>

      <form class="message-form" id="messageForm">
        <label>
          显示名称
          <input id="nameInput" type="text" placeholder="比如：小杨" required>
        </label>
        <label>
          留言内容
          <textarea id="messageInput" placeholder="写下你想公开显示的话" required></textarea>
        </label>
        <button type="submit">发布留言</button>
        <p class="status-text" id="messageStatus">登录后可以发布留言。</p>
      </form>

      <div class="message-list" id="messageList">
        <p>正在加载留言...</p>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
